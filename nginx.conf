# 明睿教务 Nginx 主配置（可在 Linux 服务器上替换 /etc/nginx/nginx.conf，或复制 server 段到 conf.d）
# 部署前请修改：① user（Debian/Ubuntu 一般为 www-data）② server_name ③ root（以下为 /home/mingrui/frontend 构建产物 dist）④ 上游端口（与后端 PORT 一致）

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 与后端上传等需求对齐，可按需调大
    client_max_body_size 20m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    include /etc/nginx/conf.d/*.conf;

    # ---------- 后端 NestJS（默认 3000，全局前缀 /api）----------
    upstream mingrui_backend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # ---------- 明睿：HTTP（证书未就绪时直接使用；上 HTTPS 后见下方说明）----------
    server {
        listen 80;
        listen [::]:80;
        # 将域名改为你的实际域名；保留 _ 便于先用 IP 调试
        server_name your-domain.com www.your-domain.com _;

        # 项目在 /home/mingrui/frontend；npm run build 后静态文件在 dist（若把 dist 内文件平铺到 frontend 根目录则去掉 /dist）
        root /home/mingrui/frontend/dist;
        index index.html;

        # SPA：前端路由
        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        # 构建产物中带 hash 的静态资源可长缓存
        location ^~ /assets/ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # API 反代到后端（须与前端 axios baseURL `/api` 一致）
        location /api/ {
            proxy_pass http://mingrui_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ---------- 明睿：HTTPS（certbot 等签发证书后取消注释，并把上面 80 的 server 改为仅跳转）----------
    #
    # 仅 HTTP 跳转示例（启用 HTTPS 后，用下面整段替换上面的 `server { listen 80 ... }` 中的 location 等内容，
    # 或单独增加一个只含 `return 301 https://$host$request_uri;` 的 server）：
    #
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name your-domain.com www.your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name your-domain.com www.your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #
    #     root /home/mingrui/frontend/dist;
    #     index index.html;
